<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأثير المنتج ثلاثي الأبعاد</title>
    <style>
        body { margin: 0; overflow-x: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.7));
        }
        section { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        h1 { font-size: 4rem; margin: 0; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        p { font-size: 1.5rem; max-width: 600px; }
    </style>
</head>
<body>
    <div class="content">
        <section>
            <h1>منتجك المذهل</h1>
            <p>حركة المرور تغير زاوية المنتج</p>
        </section>
        <section>
            <h2>مواصفات رائعة</h2>
            <p>انزلي للأسفل وشاهدي التأثير</p>
        </section>
        <section>
            <h2>اطلبي الآن</h2>
            <button style="padding:15px 40px; font-size:1.2rem; background:gold; border:none; border-radius:50px;">أضف للسلة</button>
        </section>
    </div>

    <!-- تحميل المكتبات -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // إعداد المشهد والكاميرا
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510); // لون خلفية عميق
        scene.fog = new THREE.FogExp2(0x050510, 0.008); // ضباب خفيف

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true; // تفعيل الظلال
        document.body.appendChild(renderer.domElement);

        // إضاءة احترافية
        // ضوء محيط ناعم
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // ضوء رئيسي اتجاهي
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 3, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        // ضوء خلفي ملون (لانعكاسات جميلة)
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(-1, 1, -2);
        scene.add(backLight);
        
        // ضوء متحرك من الجانب
        const fillLight = new THREE.PointLight(0xffaa66, 0.4);
        fillLight.position.set(1, 1, 2);
        scene.add(fillLight);
        
        // أضواء إضافية لتسليط الضوء
        const rimLight = new THREE.PointLight(0xff66aa, 0.3);
        rimLight.position.set(0, 1, -2.5);
        scene.add(rimLight);

        // نموذج مؤقت (مكعب لامع) لحين تحميل نموذجك الحقيقي
        // يمكنك استبداله بنموذج GLTF
        const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x44aa88,
            metalness: 0.85,
            roughness: 0.25,
            emissive: 0x114433,
            emissiveIntensity: 0.2
        });
        const productMesh = new THREE.Mesh(geometry, material);
        productMesh.castShadow = true;
        productMesh.receiveShadow = false;
        scene.add(productMesh);
        
        // إضافة كرات صغيرة حوله لتبدو كمسامير أو تفاصيل
        const sphereGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0xffaa55, metalness: 0.9 });
        for (let i = 0; i < 12; i++) {
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            const angle = (i / 12) * Math.PI * 2;
            sphere.position.set(Math.cos(angle) * 0.9, Math.sin(angle * 2) * 0.6 + 0.2, Math.sin(angle) * 0.9);
            productMesh.add(sphere);
        }
        
        // إضافة أرضية انعكاس خفيفة (دائرة شفافة)
        const reflectorMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, metalness: 0.95, roughness: 0.1, transparent: true, opacity: 0.3 });
        const disc = new THREE.Mesh(new THREE.CircleGeometry(1.8, 16), reflectorMat);
        disc.rotation.x = -Math.PI / 2;
        disc.position.y = -0.7;
        disc.receiveShadow = true;
        scene.add(disc);
        
        // مؤثرات بصرية إضافية: جزيئات خفيفة
        const particleCount = 600;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 20;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 8;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 15 - 5;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particlesMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.03, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);
        
        // متغير التحكم في التمرير
        let targetRotationX = 0;
        let targetRotationY = 0;
        let targetCameraX = 0;
        let targetCameraY = 2;
        
        // ربط التأثير بالتمرير
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.body.scrollHeight - window.innerHeight);
            // دوران المنتج مع التمرير
            targetRotationY = scrollPercent * Math.PI * 2;
            targetRotationX = Math.sin(scrollPercent * Math.PI) * 0.5;
            // تحريك الكاميرا قليلاً
            targetCameraX = (scrollPercent - 0.5) * 0.8;
            targetCameraY = 2 + Math.sin(scrollPercent * Math.PI) * 0.3;
            // تغيير لون الإضاءة الخلفية
            backLight.intensity = 0.3 + scrollPercent * 0.6;
            backLight.color.setHSL(0.55 + scrollPercent * 0.2, 1, 0.5);
            fillLight.intensity = 0.2 + scrollPercent * 0.5;
        });
        
        // حلقة الحركة
        function animate() {
            requestAnimationFrame(animate);
            
            // تطبيق الحركة بشكل ناعم (lerp)
            productMesh.rotation.x += (targetRotationX - productMesh.rotation.x) * 0.08;
            productMesh.rotation.y += (targetRotationY - productMesh.rotation.y) * 0.08;
            
            camera.position.x += (targetCameraX - camera.position.x) * 0.05;
            camera.position.y += (targetCameraY - camera.position.y) * 0.05;
            camera.lookAt(0, 0.2, 0);
            
            // دوران الجزيئات البطيء
            particles.rotation.y += 0.002;
            particles.rotation.x = Math.sin(Date.now() * 0.0005) * 0.1;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // تكييف الحجم مع النافذة
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // تنبيه: لاستخدام نموذج GLTF حقيقي، استبدلي الكود أعلاه (productMesh والمكعب) بهذا:
        /*
        const loader = new GLTFLoader();
        loader.load('path/to/your-model.glb', (gltf) => {
            const model = gltf.scene;
            model.traverse((child) => { if(child.isMesh) { child.castShadow = true; child.receiveShadow = false; } });
            model.scale.set(1.2, 1.2, 1.2);
            scene.add(model);
            productMesh = model; // تحديث المتغير
            // وإزالة productMesh القديم
        });
        */
        console.log('جاهز! جرّبي التمرير لأعلى وأسفل');
    </script>
</body>
</html>
