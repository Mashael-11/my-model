<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منتج ثلاثي الأبعاد</title>
    <style>
        body { margin: 0; overflow-x: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
        .content {
            position: relative;
            z-index: 1;
            color: white;
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.7));
        }
        section { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        h1 { font-size: 4rem; margin: 0; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        p { font-size: 1.5rem; max-width: 600px; }
        button { padding:15px 40px; font-size:1.2rem; background:gold; border:none; border-radius:50px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="content">
        <section><h1>منتجك المذهل</h1><p>حركة المرور تغير زاوية المنتج</p></section>
        <section><h2>مواصفات رائعة</h2><p>انزلي للأسفل وشاهدي التأثير</p></section>
        <section><h2>اطلبي الآن</h2><button>أضف للسلة</button></section>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // إضاءة
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(2, 3, 4);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(-1, 1, -2);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffaa66, 0.4);
        fillLight.position.set(1, 1, 2);
        scene.add(fillLight);

        // نموذج مؤقت (مكعب لامع) إلى أن تضعي رابط نموذجك الحقيقي
        // اكتبي رابط نموذجك الـ GLB في المتغير التالي بدل null
        const modelURL = null; // <--- ضعي هنا رابط GLB حقك
        
        let productMesh;
        
        if (modelURL) {
            const loader = new GLTFLoader();
            loader.load(modelURL, (gltf) => {
                productMesh = gltf.scene;
                productMesh.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        if (child.material) {
                            child.material.metalness = 0.85;
                            child.material.roughness = 0.25;
                        }
                    }
                });
                productMesh.scale.set(1.2, 1.2, 1.2);
                scene.add(productMesh);
            }, undefined, (error) => console.error('خطأ:', error));
        } else {
            // نموذج مؤقت جميل (مكعب لامع مع كرات)
            const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const material = new THREE.MeshStandardMaterial({ color: 0x44aa88, metalness: 0.85, roughness: 0.25, emissive: 0x114433, emissiveIntensity: 0.2 });
            productMesh = new THREE.Mesh(geometry, material);
            productMesh.castShadow = true;
            scene.add(productMesh);
            
            const sphereGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const sphereMat = new THREE.MeshStandardMaterial({ color: 0xffaa55, metalness: 0.9 });
            for (let i = 0; i < 12; i++) {
                const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                const angle = (i / 12) * Math.PI * 2;
                sphere.position.set(Math.cos(angle) * 0.9, Math.sin(angle * 2) * 0.6 + 0.2, Math.sin(angle) * 0.9);
                productMesh.add(sphere);
            }
        }
        
        // حركة التمرير
        let targetRotationX = 0, targetRotationY = 0;
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.body.scrollHeight - window.innerHeight);
            targetRotationY = scrollPercent * Math.PI * 2;
            targetRotationX = Math.sin(scrollPercent * Math.PI) * 0.5;
            backLight.intensity = 0.3 + scrollPercent * 0.6;
        });
        
        function animate() {
            requestAnimationFrame(animate);
            if (productMesh) {
                productMesh.rotation.x += (targetRotationX - productMesh.rotation.x) * 0.08;
                productMesh.rotation.y += (targetRotationY - productMesh.rotation.y) * 0.08;
            }
            camera.lookAt(0, 0.2, 0);
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('الموقع جاهز - ضعي رابط GLB في المتغير modelURL');
    </script>
</body>
</html>
